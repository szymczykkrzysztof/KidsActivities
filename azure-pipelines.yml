trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - develop

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: UseDotNet@2
    inputs:
      version: '10.x'

  - script: find . -name "*.sln" | head -20
    displayName: 'Debug: Find sln files'
    
  - script: dotnet restore KidsActivities.sln
    displayName: 'Restore'

  - script: dotnet build KidsActivities.sln --no-restore -c Release
    displayName: 'Build'

  - script: dotnet test KidsActivities.sln --no-build -c Release
    displayName: 'Test'